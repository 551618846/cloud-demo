# ==================== m1-consumer ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: m1-consumer
  namespace: cloud-demo
  labels:
    app: m1-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: m1-consumer
  template:
    metadata:
      labels:
        app: m1-consumer
        version: v1
    spec:
      containers:
      - name: m1-consumer
        image: m1-consumer:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: cloud-demo-config
              key: SPRING_PROFILES_ACTIVE
        - name: SPRING_CLOUD_NACOS_SERVER_ADDR
          valueFrom:
            configMapKeyRef:
              name: cloud-demo-config
              key: NACOS_SERVER_ADDR
        - name: SPRING_CLOUD_NACOS_CONFIG_NAMESPACE
          valueFrom:
            configMapKeyRef:
              name: cloud-demo-config
              key: NACOS_NAMESPACE
        - name: JAVA_OPTS
          value: "-javaagent:/skywalking-agent/skywalking-agent.jar -Dskywalking.agent.service_name=m1-consumer-service -Dskywalking.collector.backend_service=$(SKYWALKING_COLLECTOR)"
        - name: SKYWALKING_COLLECTOR
          valueFrom:
            configMapKeyRef:
              name: cloud-demo-config
              key: SKYWALKING_COLLECTOR
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: skywalking-agent
          mountPath: /skywalking-agent
          readOnly: true
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 5
      volumes:
      - name: logs
        hostPath:
          path: /var/log/cloud-demo
          type: DirectoryOrCreate
      - name: skywalking-agent
        hostPath:
          path: /opt/skywalking-agent
          type: Directory

