# ==================== Nacos ConfigMap ====================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nacos-config
  namespace: cloud-demo
data:
  MODE: "standalone"
  SPRING_DATASOURCE_PLATFORM: "mysql"
  MYSQL_SERVICE_HOST: "mysql"
  MYSQL_SERVICE_PORT: "3306"
  MYSQL_SERVICE_DB_NAME: "nacos"
  MYSQL_SERVICE_USER: "nacos"
  MYSQL_SERVICE_PASSWORD: "nacos"
  JVM_XMS: "512m"
  JVM_XMX: "512m"
  JVM_XMN: "256m"

---
# ==================== Nacos Service ====================
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: cloud-demo
  labels:
    app: nacos
spec:
  type: NodePort
  ports:
  - port: 8848
    targetPort: 8848
    nodePort: 30848
    name: http
  - port: 9848
    targetPort: 9848
    name: grpc-client
  - port: 9849
    targetPort: 9849
    name: grpc-server
  selector:
    app: nacos

---
# ==================== Nacos Deployment ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: cloud-demo
  labels:
    app: nacos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
      - name: nacos
        image: docker.1ms.run/nacos/nacos-server:v2.2.3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8848
        - containerPort: 9848
        - containerPort: 9849
        envFrom:
        - configMapRef:
            name: nacos-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /nacos/v1/console/health/readiness
            port: 8848
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /nacos/v1/console/health/readiness
            port: 8848
          initialDelaySeconds: 30
          periodSeconds: 5
        volumeMounts:
        - name: nacos-logs
          mountPath: /home/nacos/logs
      volumes:
      - name: nacos-logs
        emptyDir: {}
