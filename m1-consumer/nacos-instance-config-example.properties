# Nacos服务实例配置示例
# Data ID: m1-consumer-service-dev.properties
# Group: DEFAULT_GROUP

# 服务端口
server.port=8081

# 服务名称
spring.application.name=m1-consumer-service

# Nacos配置中心
spring.cloud.nacos.server-addr=127.0.0.1:8848
spring.cloud.nacos.config.namespace=dev
spring.config.import[0]=nacos:m1-consumer-service-dev.properties?refreshEnabled=true
spring.config.import[1]=nacos:my-common-dev.properties?refreshEnabled=true

# Nacos服务发现
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848
spring.cloud.nacos.discovery.namespace=dev

# 服务版本元数据（重要：用于灰度路由）
spring.cloud.nacos.discovery.metadata.version=gray-v1
spring.cloud.nacos.discovery.metadata.env=dev
spring.cloud.nacos.discovery.metadata.region=default

# 示例1: 稳定版本配置
# spring.cloud.nacos.discovery.metadata.version=stable

# 示例2: 灰度版本配置
# spring.cloud.nacos.discovery.metadata.version=gray-v1

# 示例3: 金丝雀版本配置
# spring.cloud.nacos.discovery.metadata.version=canary-v1
