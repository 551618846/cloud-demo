server.port=8081
spring.application.name=m1-consumer-service

spring.profiles.active=dev
#spring.profiles.active=prod

spring.cloud.nacos.server-addr=127.0.0.1:8848
spring.cloud.nacos.config.namespace=${spring.profiles.active}
spring.config.import[0]=nacos:${spring.application.name}-${spring.profiles.active}.properties?refreshEnabled=true
spring.config.import[1]=nacos:my-common-${spring.profiles.active}.properties?refreshEnabled=true

