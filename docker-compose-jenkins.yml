services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile-jenkins
    image: jenkins-custom:latest
    container_name: jenkins
    privileged: true
    user: root
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - D:/software/apache-skywalking-java-agent-9.6.0/skywalking-agent:/skywalking-agent:ro
      - C:/Users/huangzl/.ssh:/host_ssh:ro
    environment:
      - JENKINS_OPTS=--prefix=/jenkins
    restart: unless-stopped
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /root/.ssh
        cp /host_ssh/id_rsa /root/.ssh/id_rsa
        cp /host_ssh/id_rsa.pub /root/.ssh/id_rsa.pub
        chmod 700 /root/.ssh
        chmod 600 /root/.ssh/id_rsa
        chmod 644 /root/.ssh/id_rsa.pub
        ssh-keyscan github.com >> /root/.ssh/known_hosts 2>/dev/null
        /usr/local/bin/jenkins.sh

volumes:
  jenkins_home:
